    <div class="slider">

       <div class="slides">
    <img src="Sude1.jpg.jpeg" id="slide-img">
    </div>

        <button class="prev" onclick="geri()">❮</button>
        <button class="next" onclick="ileri()">❯</button>

    </div>

   <script>

    let resimler = [
        "Sude1.jpg.jpeg",
        "Sude2.jpg.jpeg",
        "Sude3.jpg.jpeg"
    ];

    let sira = 0;

    function ileri(){

        sira++;

        if(sira >= resimler.length){
            sira = 0;
        }

        document.getElementById("slide-img").src = resimler[sira];
    }

    function geri(){

        sira--;

        if(sira < 0){
            sira = resimler.length - 1;
        }

        document.getElementById("slide-img").src = resimler[sira];
    }

</script>
