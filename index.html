    <div class="gunun-sozu-bandi">
    <div class="soz-container">
        <i class="fas fa-quote-left">
        <span id="soz-metni">İlham verici bir söz yükleniyor...</span>
        <strong id="soz-yazari"></strong>
    </div>
<script>
async function sozGetir() {
    try {
        const response = await fetch("https://api.adviceslip.com/advice");
        const data = await response.json();
        
        document.getElementById("soz-metni").innerText = `"${data.slip.advice}"`;
        document.getElementById("soz-yazari").innerText = "- Advise of the Moment";
    } catch (error) {
        console.error("Hata oluştu:", error);
        document.getElementById("soz-metni").innerText = "Stay hungry, stay foolish.";
        document.getElementById("soz-yazari").innerText = "- Steve Jobs";
    }
}
sozGetir();
</script>
