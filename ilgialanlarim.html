    <div class="film-kart">
     <h2>🎬 Günün Filmi</h2>

    <img id="filmPoster">

    <h3 id="filmAd"></h3>

    <p id="filmYil"></p>

    <p id="filmTur"></p>
</div>
    <script>

const filmler = [

    "Interstellar",
    "La La Land",
    "Titanic",
    "The Notebook",
    "About Time",
    "Flipped",
    "Harry Potter",
    "Inception",
    "Me Before You",
    "Little Women",
    "Pride and Prejudice",
    "Mamma Mia",
    "The Holiday",
    "Enola Holmes",
    "To All the Boys I've Loved Before"

];

let rastgeleFilm =
filmler[Math.floor(Math.random() * filmler.length)];

fetch(`https://www.omdbapi.com/?t=${rastgeleFilm}&apikey=5129cfa`)

.then(response => response.json())

.then(data => {

    document.getElementById("filmPoster").src = data.Poster;

    document.getElementById("filmAd").innerText = data.Title;

    document.getElementById("filmYil").innerText =
    "Yıl: " + data.Year;

    document.getElementById("filmTur").innerText =
    "Tür: " + data.Genre;

});

</script>
